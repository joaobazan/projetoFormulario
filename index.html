<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de carros</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
   
 <div class="form-container"> 
    <div class="form-header">
        <p>Formulário</p>
        
     </div>
     </div>
     <div class="form-body">
<h1 class="titulo-form">Venda Fácil Seu Carro</h1>
<p>Descreva as características do seu veículo e marque as opcionais que ele possui.</p>
     <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
             <form>
        <div class="caixainputs">
            <label for="title">Título do anuncio <span class="campo-obrigatorio">*</span>
            </label>
           <input type="text" name="title" id="title" class="block" 
            placeholder="Digite um título para o anúncio"> 
        </div>
          <div class="caixainputs">
            <label for="title">Preço<span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="title" id="title" class="block" 
            placeholder="Preço">
        </div>
        <div class="caixaInputs">
            <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label><textarea name="descricao" id="descricao" class="block"
                placeholder="Digite a descrição do seu veículo"></textarea> 
            </div>
            <div class="caixainputs">
            <label for="title">Preço<span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="title" id="title" class="block" 
            placeholder="Preço">
        </div>
        <div class="caixainputs">
            <label for="marca">Marca<span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="marca" id="marca" class="block" 
            placeholder="Digite a marca.">
        </div>
        <div class="caixainputs">
            <label for="modelo">Modelo<span class="campo-obrigatorio">*</span>
            </label>
            <input type="text" name="modelo" id="modelo" class="block" 
            placeholder="Digite o modelo.">
        </div>
        <div class="caixainputs">
            <label for="kilometragem">Kilometragem<span class="campo-obrigatorio">*</span>
            </label>
            <input type="number" name="kilometragem" id="kilometragem" class="block" 
            placeholder="Digite a kilometragem.">
        </div>
        <div class="caixainputs">
            <label for="data-compra">Data de compra<span class="campo-obrigatorio">*</span>
            </label>
            <input type="date" name="data-compra" id="data-compra" class="block">
        </div>
        <div class="caixaInputs">
            <p>Tipo de câmbio: <sapn class="campo-obrigatorio">*</sapn></p>
            <input type="radio" name="marcha" id="manual">
            <label for="manual">Manual</label>
            <input type="radio" name="marcha" id="automatico">
            <label for="auto">Automático</label>
        </div>
        
    </form>
 </header>
     </div>
    </div>
</body>
</html>
